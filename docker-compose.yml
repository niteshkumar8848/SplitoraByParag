services:
  postgres:
    image: postgres:16-alpine
    container_name: splitora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: splitora
    ports:
      - "5432:5432"
    volumes:
      - splitora_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d splitora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  splitora_pg_data:
